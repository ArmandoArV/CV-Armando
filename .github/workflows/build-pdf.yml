name: Build CV PDF

on:
  push:
    branches:
      - main
    paths:
      - 'main.tex'
      - '.github/workflows/build-pdf.yml'
      - '**/*.tex'
      - '**/*.sty'
      - '**/*.cls'
      - '**/*.bib'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.svg'
  pull_request:
    paths:
      - 'main.tex'
      - '.github/workflows/build-pdf.yml'
      - '**/*.tex'
      - '**/*.sty'
      - '**/*.cls'
      - '**/*.bib'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.svg'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: false
          latexmk_shell_escape: false

      - name: Verify single page
        run: |
          sudo apt-get install -y -qq poppler-utils > /dev/null 2>&1
          PAGES=$(pdfinfo main.pdf | grep Pages | awk '{print $2}')
          echo "PDF has $PAGES page(s)"
          if [ "$PAGES" -ne 1 ]; then
            echo "::error::CV must be exactly 1 page but has $PAGES pages"
            exit 1
          fi

      - name: Publish PDF to latest release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest main.pdf \
            --title "Latest CV" \
            --notes "Auto-built from $(git rev-parse --short HEAD)" \
            --latest
